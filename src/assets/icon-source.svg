<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MG monogram on warm paper">
  <!--
    Editorial paper + signal-orange theme, mirroring the site:
      paper-50 → paper-200 cream background
      ink-900 "M" + signal-500 burnt-orange "G"
      a single live-signal dot in the top-right — the "open / live" tell
  -->
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6f0"/>
      <stop offset="100%" stop-color="#efe5d4"/>
    </linearGradient>
  </defs>

  <!-- Warm cream paper, rounded — matches PWA / Apple icon styling -->
  <rect width="512" height="512" rx="112" fill="url(#paper)"/>

  <!-- Live-signal accent in top-right corner (kept inside the safe zone
       for maskable icons too — at r≈20 with halo r=40, it survives the
       80% safe-area crop on Android adaptive icons) -->
  <circle cx="396" cy="116" r="40" fill="#cc5500" opacity="0.16"/>
  <circle cx="396" cy="116" r="22" fill="#cc5500"/>

  <!-- MG monogram. M in ink, G in burnt-orange — a one-glance brand cue. -->
  <text x="50%" y="56%" text-anchor="middle" dominant-baseline="middle"
        font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="800" font-size="276" letter-spacing="-12">
    <tspan fill="#1a1715">M</tspan><tspan fill="#cc5500">G</tspan>
  </text>
</svg>
