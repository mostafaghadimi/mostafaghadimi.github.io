<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MG monogram">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b1f7a"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ebe5ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#0a0a0f"/>
  <rect width="512" height="512" rx="112" fill="url(#bg)" opacity="0.22"/>
  <!-- glow accent in top-right -->
  <circle cx="396" cy="116" r="28" fill="#9b75ff" opacity="0.95"/>
  <circle cx="396" cy="116" r="42" fill="#9b75ff" opacity="0.18"/>
  <!-- Monogram -->
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle"
        font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-weight="800" font-size="248" letter-spacing="-8" fill="url(#text)">MG</text>
</svg>
