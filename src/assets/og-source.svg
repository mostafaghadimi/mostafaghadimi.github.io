<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#131521"/>
    </linearGradient>
    <radialGradient id="halo" cx="20%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9b75ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Monogram badge -->
  <g transform="translate(76,76)">
    <rect width="92" height="92" rx="20" fill="#131521" stroke="#7c3aed" stroke-opacity="0.5" stroke-width="2"/>
    <text x="46" y="50" text-anchor="middle" dominant-baseline="middle"
          font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="42"
          fill="#ffffff" letter-spacing="-1">MG</text>
  </g>

  <!-- Status pill -->
  <g transform="translate(196,98)">
    <rect width="280" height="36" rx="18" fill="#131521" stroke="#2f3340" stroke-width="1"/>
    <circle cx="20" cy="18" r="5" fill="#34d399"/>
    <text x="36" y="18" dominant-baseline="middle"
          font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="14"
          fill="#9ea2ac">Open to senior remote roles</text>
  </g>

  <!-- Headline -->
  <text x="76" y="280" font-family="Inter, system-ui, sans-serif" font-weight="700"
        font-size="76" fill="#ffffff" letter-spacing="-2">
    <tspan>Mostafa Ghadimi</tspan>
  </text>
  <text x="76" y="360" font-family="Inter, system-ui, sans-serif" font-weight="600"
        font-size="44" fill="url(#accent)" letter-spacing="-1">
    <tspan>Senior Data &amp; AI Engineer</tspan>
  </text>
  <text x="76" y="408" font-family="Inter, system-ui, sans-serif" font-weight="400"
        font-size="22" fill="#9ea2ac" letter-spacing="-0.2">
    <tspan>Tech Lead &#183; Platform &amp; AI &#183; 6+ years</tspan>
  </text>

  <!-- Tech chips row -->
  <g transform="translate(76,488)" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" fill="#c8cad0">
    <g>
      <rect width="116" height="36" rx="18" fill="#131521" stroke="#2f3340"/>
      <text x="58" y="22" text-anchor="middle">ClickHouse</text>
    </g>
    <g transform="translate(128,0)">
      <rect width="88" height="36" rx="18" fill="#131521" stroke="#2f3340"/>
      <text x="44" y="22" text-anchor="middle">Kafka</text>
    </g>
    <g transform="translate(228,0)">
      <rect width="80" height="36" rx="18" fill="#131521" stroke="#2f3340"/>
      <text x="40" y="22" text-anchor="middle">Pinot</text>
    </g>
    <g transform="translate(320,0)">
      <rect width="64" height="36" rx="18" fill="#131521" stroke="#2f3340"/>
      <text x="32" y="22" text-anchor="middle">dbt</text>
    </g>
    <g transform="translate(396,0)">
      <rect width="124" height="36" rx="18" fill="#131521" stroke="#2f3340"/>
      <text x="62" y="22" text-anchor="middle">LangGraph</text>
    </g>
    <g transform="translate(532,0)">
      <rect width="132" height="36" rx="18" fill="#131521" stroke="#2f3340"/>
      <text x="66" y="22" text-anchor="middle">Kubernetes</text>
    </g>
  </g>

  <!-- Footer URL -->
  <text x="76" y="582" font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="18" fill="#6d7280" letter-spacing="0.05em">
    mostafaghadimi.github.io
  </text>
</svg>
